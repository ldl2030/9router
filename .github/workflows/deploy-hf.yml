name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "Error: Missing HF_TOKEN, HF_USERNAME, or HF_SPACE_NAME secrets."
            echo "Please configure these secrets in your GitHub repository settings."
            exit 1
          fi
          
          # 配置 Git 信息
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 给 README.md 顶部注入 Hugging Face 所需的配置项 (Frontmatter)
          cat << 'EOF' > hf-frontmatter.txt
---
title: 9Router AI Gateway
emoji: 🚀
colorFrom: blue
colorTo: indigo
sdk: docker
pinned: false
---

EOF
          cat README.md >> hf-frontmatter.txt
          mv hf-frontmatter.txt README.md
          
          # 核心修复：Hugging Face 拒绝二进制文件（如图片）提交
          # 我们通过创建一个无历史的新分支 (orphan branch) 并配置 Git LFS 来解决这个问题
          git checkout --orphan hf-deploy
          
          # 清除现有的 Git 缓存状态
          git rm -rf --cached .
          
          # 安装并配置 Git LFS 追踪所有图片文件
          git lfs install
          cat << 'EOF' > .gitattributes
*.png filter=lfs diff=lfs merge=lfs -text
*.jpg filter=lfs diff=lfs merge=lfs -text
*.jpeg filter=lfs diff=lfs merge=lfs -text
*.ico filter=lfs diff=lfs merge=lfs -text
*.gif filter=lfs diff=lfs merge=lfs -text
EOF
          
          # 重新添加所有文件，此时 Git 会用 LFS 处理图片
          git add .gitattributes
          git add -A
          git commit -m "Deploy to Hugging Face Spaces"
          
          # 强制推送到 Hugging Face 的 main 分支
          git remote add space https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          git push --force space hf-deploy:main
