name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install -U "huggingface_hub[cli]"

      - name: Push to Hugging Face Hub via CLI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "Error: Missing HF_TOKEN, HF_USERNAME, or HF_SPACE_NAME secrets."
            echo "Please configure these secrets in your GitHub repository settings."
            exit 1
          fi
          
          # 删除 .git 文件夹，不需要上传到 HF
          rm -rf .git
          
          # 给 README.md 顶部注入 Hugging Face 所需的配置项 (Frontmatter)
          cat << 'EOF' > hf-frontmatter.txt
---
title: 9Router AI Gateway
emoji: 🚀
colorFrom: blue
colorTo: indigo
sdk: docker
pinned: false
---

EOF
          cat README.md >> hf-frontmatter.txt
          mv hf-frontmatter.txt README.md
          
          # 使用 hf CLI 绕过 git 的二进制文件限制，上传到远程仓库的根目录
          hf upload $HF_USERNAME/$HF_SPACE_NAME . / --repo-type space --token $HF_TOKEN
